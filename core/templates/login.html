{% extends "base.html" %}
{% block content %}
<section class="min-h-[60vh] flex items-center justify-center">
  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-md">
    <h1 class="text-2xl font-playfair font-semibold mb-4 text-center">Log in</h1>
    {% if messages %}
    <div class="space-y-2 mb-4">
      {% for message in messages %}
        <div class="text-sm text-red-600">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}
    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label class="block text-sm text-gray-700">Email</label>
        <input name="email" type="email" value="{{ email|default_if_none:'' }}" class="w-full px-4 py-2 border rounded-lg" required />
      </div>
      <div>
        <label class="block text-sm text-gray-700">Password</label>
        <input name="password" type="password" class="w-full px-4 py-2 border rounded-lg" required />
      </div>
      <div class="pt-4">
        <button type="submit" class="w-full px-6 py-3 bg-[#3E4CFF] text-white rounded-lg hover:bg-[#7B8FFF] transition">Log in</button>
      </div>
    </form>
    <div class="text-center mt-4 text-sm text-gray-600">
      Don't have an account? <a href="{% url 'signup' %}" class="text-[#3E4CFF]">Sign up</a>
    </div>
  </div>
</section>
{% endblock %}
